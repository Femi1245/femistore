name: Build Zumelia Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "android/**"
      - "capacitor.config.ts"
      - "public/index.html"
      - ".github/workflows/android-apk.yml"
      - "package.json"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Sync Capacitor
        run: npx cap sync android
        env:
          CAPACITOR_SERVER_URL: https://itunes-mu.vercel.app/login

      - name: Build debug APK
        working-directory: android
        run: chmod +x gradlew && ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/debug/app-debug.apk dist/Zumelia.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: zumelia-android
          path: dist/Zumelia.apk

      - name: Publish / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: Zumelia Android App
          body: |
            Install **Zumelia.apk** on your Android phone.

            After install, open the **Zumelia** icon — login/signup opens first (no browser).
            Install prompts are hidden inside the app.
          files: dist/Zumelia.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

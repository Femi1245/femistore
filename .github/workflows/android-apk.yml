name: Build Zumelia Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "android/**"
      - "capacitor.config.ts"
      - "public/index.html"
      - "public/images/zumelia.png"
      - "scripts/generate-android-icons.mjs"
      - ".github/workflows/android-apk.yml"
      - "package.json"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Generate Zumelia launcher icons
        run: npm run android:icons

      - name: Sync Capacitor
        run: npx cap sync android
        env:
          CAPACITOR_SERVER_URL: https://itunes-mu.vercel.app/login?native=1

      - name: Build debug APK
        working-directory: android
        run: chmod +x gradlew && ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/debug/app-debug.apk dist/Zumelia.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: zumelia-android
          path: dist/Zumelia.apk

      - name: Delete old android-latest release (force refresh)
        continue-on-error: true
        run: |
          gh release delete android-latest --yes --cleanup-tag || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: Zumelia Android App
          body: |
            ## Install Zumelia (real app)

            1. Download **Zumelia.apk** below
            2. Uninstall any older Zumelia app first
            3. Install this APK
            4. Open the **Zumelia** icon → login/signup (not the browser)

            Icon uses the official Zumelia logo. Download/install banners are hidden inside the app.
          files: dist/Zumelia.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
